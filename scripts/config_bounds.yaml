# =============================================================================
# config_bounds.yaml — Configuration for genWW3grid_fromBounds.py
# =============================================================================
#
# Usage:
#   python genWW3grid_fromBounds.py config_bounds.yaml
#
# Copy this file and edit for your region of interest.
# =============================================================================


# -----------------------------------------------------------------------------
# GRID DOMAIN & RESOLUTION
# -----------------------------------------------------------------------------
grid:

  # Longitude / Latitude bounds (degrees)
  # Accepted conventions:
  #   -180 to 180  (western hemisphere negative)
  #    0   to 360  (all positive, e.g. 314 for -46°W)
  lon_min: -46.0
  lon_max: -38.0
  lat_min: -26.0
  lat_max: -18.0

  # Grid spacing (degrees)
  dx: 0.05   # ~5.5 km at these latitudes
  dy: 0.05

  # Depth thresholds for WW3
  # zdep: grid cells with elevation > zdep (m) are classified as LAND
  zdep: -0.10

  # zmin: minimum allowed water depth (m) in WW3
  zmin: 2.50


# -----------------------------------------------------------------------------
# BATHYMETRY SOURCE
# -----------------------------------------------------------------------------
bathymetry:

  # --- Option 1: Local NetCDF file (recommended) ---
  # Supported datasets: GEBCO 2022/2023, ETOPO1, ETOPO 2022, SRTM30, ...
  # The elevation variable and lat/lon coordinate names are auto-detected.
  # Download GEBCO: https://www.gebco.net/data_and_products/gridded_bathymetry_data/
  source: file
  file: /Users/jtakeo/googleDrive/myProjects/atmosMarine/ww3UnstGrid/data/bathy/bra_gebco.nc
  # variable: elevation   # uncomment only if auto-detection fails

  # --- Option 2: Download on-the-fly via pygmt ---
  # Requires: pip install pygmt   AND   GMT installed (https://www.generic-mapping-tools.org/)
  # Comment out the 'file' line above and uncomment below:
  # source: pygmt
  # pygmt_resolution: 01m   # '01m'=1 arc-min, '30s'=30 arc-sec, '15s'=15 arc-sec


# -----------------------------------------------------------------------------
# OUTPUT
# -----------------------------------------------------------------------------
output:
  directory: rio_grid    # output directory (created automatically)
  prefix:    rio         # filename prefix → rio.dep, rio.mask, rio.obs, rio.meta


# =============================================================================
# EXAMPLES
# =============================================================================

