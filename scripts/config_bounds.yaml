# =============================================================================
# CURVILINEAR GRID EXAMPLES
# =============================================================================

# --- Curvilinear grid loaded from a NetCDF file ---
# The NetCDF file must contain 2D (NY×NX) or 1D longitude and latitude arrays.
# Common variable name pairs auto-detected:
#   lon/lat, longitude/latitude, x_rho/y_rho, nav_lon/nav_lat, TLON/TLAT
#
# grid:
#   type: curv
#   curv_file: /path/to/roms_grid.nc   # NetCDF file with lon/lat arrays
#   # Optionally specify variable names if auto-detection fails:
#   # curv_lon_var: lon_rho
#   # curv_lat_var: lat_rho
# bathymetry:
#   source: file
#   file: /path/to/gebco.nc
# output:
#   directory: curv_grid
#   prefix: my_curv_grid

# --- Polar stereographic grid (Southern Ocean / Arctic) ---
# Generates a uniform-km-spacing polar stereographic grid using the
# Snyder inverse projection formula.
# Required parameters: center_lon, center_lat, nx, ny, dx_km
#
# grid:
#   type: curv
#   projection: stereo
#   center_lon: 0.0      # longitude of grid centre (degrees)
#   center_lat: -90.0    # latitude  of grid centre (degrees, use -90 for S. Pole)
#   nx: 200              # number of grid points in x (lon) direction
#   ny: 200              # number of grid points in y (lat) direction
#   dx_km: 9.0           # uniform horizontal spacing in km
# bathymetry:
#   source: file
#   file: /path/to/gebco.nc
# output:
#   directory: stereo_grid
#   prefix: antartica_stereo
